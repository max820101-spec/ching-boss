<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>檠檠BOSS團隊</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{
font-family:Arial;
background:
linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url("https://megapx-assets.dcard.tw/images/c7fe52fd-3629-450a-9bd7-6a3c81480b6a/640.jpeg");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:#e8f6ff;
padding:15px;
max-width:900px;
margin:auto;
min-height:100vh;
}

.logoWrap{text-align:center;margin-bottom:10px;}
.logo{width:140px;filter: drop-shadow(0 0 10px rgba(0,200,255,0.7));}
h2{text-align:center;color:#7fdfff;}

textarea{
padding:10px;width:100%;
border-radius:8px;border:1px solid rgba(255,255,255,0.2);
background:rgba(0,40,70,0.6);color:#e8f6ff;
margin-bottom:5px;
}

button{
padding:6px 10px;margin:4px;border:none;
border-radius:8px;cursor:pointer;font-weight:bold;
}

.killBtn{background:#ff1744;color:#fff;}
.checkBtn{background:#00bcd4;color:#001c2b;}
.copyBtn{background:#045d75;color:#fff;}
.resetBtn{background:#aa2222;color:#fff;}

.actionBtn{
margin-left:6px;
padding:4px 8px;
font-size:12px;
border-radius:6px;
cursor:pointer;
border:none;
}

.btnKill{background:#00e676;color:#003300;}
.btnRob{background:#ff1744;color:#fff;}

.delBtn{
background:#ff5252;
color:#fff;
margin-right:8px;
padding:3px 7px;
border-radius:50%;
font-size:12px;
cursor:pointer;
}

.card{
margin:8px 0;padding:12px;border-radius:12px;
background:rgba(0,60,90,0.7);
}

.rank1{background:#ff2d2d !important;color:#fff;font-weight:bold;}
.rank2{background:#8e44ad !important;color:#fff;font-weight:bold;}
.rank3{background:#007bff !important;color:#fff;font-weight:bold;}
.rank4{background:#00c853 !important;color:#fff;font-weight:bold;}
.rank5{background:#ffd600 !important;color:#000;font-weight:bold;}

.robbed{color:#ff4d4d;font-weight:bold;}

#stats{
font-size:42px;
font-weight:bold;
margin:10px 0 5px 0;
text-align:center;
transition:0.3s;
}

#milestone{
text-align:center;
font-size:22px;
font-weight:bold;
margin-bottom:10px;
opacity:0;
transition:0.5s;
}

.milestoneShow{opacity:1;transform:scale(1.1);}
.flash{animation:flashAnim 0.6s ease;}

@keyframes flashAnim{
0%{transform:scale(1);}
50%{transform:scale(1.25);}
100%{transform:scale(1);}
}

.level1{color:#ffd600;text-shadow:0 0 10px #ffd600;}
.level2{color:#00e676;text-shadow:0 0 12px #00e676;}
.level3{color:#00b0ff;text-shadow:0 0 12px #00b0ff;}
.level4{color:#aa00ff;text-shadow:0 0 15px #aa00ff;}
.level5{color:#ff1744;text-shadow:0 0 15px #ff1744;}
.level6{
background:linear-gradient(45deg,red,orange,yellow,green,cyan,blue,purple);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:bold;
}

.m50{color:#ffd600;text-shadow:0 0 10px #ffd600;}
.m100{color:#00e676;text-shadow:0 0 12px #00e676;}
.m120{color:#00b0ff;text-shadow:0 0 12px #00b0ff;}
.m150{color:#aa00ff;text-shadow:0 0 15px #aa00ff;}
.m200{color:#ff1744;text-shadow:0 0 15px #ff1744;}
.m250{
background:linear-gradient(45deg,red,orange,yellow,green,cyan,blue,purple);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:bold;
}

h3{margin-top:25px;color:#7fdfff;}
</style>
</head>
<body>

<div class="logoWrap">
<img src="./IMG_0391.png?v=1" class="logo">
<h2>檠檠BOSS團隊</h2>
</div>

<div id="clock"></div>
<div id="stats"></div>
<div id="milestone"></div>

<h3>⚔️ 擊殺並更新（會 +1）</h3>
<textarea id="killInput" rows="2"></textarea>
<button class="killBtn" onclick="handleKill()">擊殺並更新</button>

<h3>⏱ 確認時間（不 +1）</h3>
<textarea id="checkInput" rows="2"></textarea>
<button class="checkBtn" onclick="handleCheck()">確認時間</button>

<button class="copyBtn" onclick="copyConfirmed()">複製已確認</button>
<button class="copyBtn" onclick="copyNeed()">複製未確認</button>
<button class="resetBtn" onclick="resetAll()">重置全部</button>

<h3>📡 目前頻道數（已確認）</h3>
<div id="channelCount"></div>

<h3>✅ 已確認</h3>
<div id="confirmed"></div>

<h3>📝 需要再確認</h3>
<div id="needConfirm"></div>

<script>
const firebaseConfig={
apiKey:"AIzaSyARK9NLOTdrqwkDX3dr9isdwEVGCih5Uno",
authDomain:"ching-fishboss-kill.firebaseapp.com",
projectId:"ching-fishboss-kill"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

function nowTW(){
return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Taipei"}));
}
function fmt(t){return t.toTimeString().slice(0,5);}

setInterval(()=>{
clock.innerText="台灣時間 "+fmt(nowTW());
},1000);

["killInput","checkInput"].forEach(id=>{
document.getElementById(id).addEventListener("keydown",e=>{
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
if(id==="killInput") handleKill();
else handleCheck();
}
});
});

async function addKillCount(){
const ref=db.collection("stats").doc("today");
const doc=await ref.get();
if(!doc.exists){
await ref.set({total:1});
}else{
await ref.update({
total:firebase.firestore.FieldValue.increment(1)
});
}
}

function handleKill(){
parseInput(killInput.value,true);
killInput.value="";
}

function handleCheck(){
parseInput(checkInput.value,false);
checkInput.value="";
}

function parseInput(raw,addKill){
let tokens=raw.trim().split(/\s+/);
for(let i=0;i<tokens.length;i+=2){
let ch=tokens[i];
let arg=tokens[i+1];
if(!ch||!arg) continue;

if(arg==="K"){
db.collection("bosses").doc(ch).set({ch,type:"need",status:"kill",time:nowTW().getTime()});
addKillCount();
continue;
}

if(arg==="R"){
db.collection("bosses").doc(ch).set({ch,type:"need",status:"rob",time:nowTW().getTime()});
continue;
}

let time;
if(arg.length===4){
let h=parseInt(arg.slice(0,2));
let m=parseInt(arg.slice(2));
let d=nowTW();
d.setHours(h);d.setMinutes(m);
time=d.getTime();
}else{
time=nowTW().getTime()+parseInt(arg)*60000;
}

db.collection("bosses").doc(ch).set({ch,type:"confirmed",time});
if(addKill) addKillCount();
}
}

function deleteChannel(ch){
if(!confirm("確定移除頻道 "+ch+" ?")) return;
db.collection("bosses").doc(ch).delete();
}

function markKill(ch){
db.collection("bosses").doc(ch).set({ch,type:"need",status:"kill",time:nowTW().getTime()});
addKillCount();
}

function markRob(ch){
db.collection("bosses").doc(ch).set({ch,type:"need",status:"rob",time:nowTW().getTime()});
}

function copyConfirmed(){
let text="";
document.querySelectorAll("#confirmed .card").forEach(card=>{
let ch=card.querySelector("b").innerText;
let match=card.innerText.match(/\d{2}:\d{2}/);
if(match) text+=ch+" "+match[0]+"\n";
});
navigator.clipboard.writeText(text.trim());
alert("已複製頻道與時間");
}

function copyNeed(){
let text="";
document.querySelectorAll("#needConfirm .card").forEach(card=>{
let ch=card.querySelector("b").innerText;
text+=ch+"\n";
});
navigator.clipboard.writeText(text.trim());
alert("已複製未確認");
}

db.collection("bosses").onSnapshot(s=>{
let confirmedArr=[],needArr=[];
s.forEach(doc=>{
let d=doc.data();
if(d.type==="confirmed") confirmedArr.push(d);
if(d.type==="need") needArr.push(d);
});

confirmedArr.sort((a,b)=>a.time-b.time);
needArr.sort((a,b)=>b.time-a.time);

channelCount.innerHTML="目前 "+confirmedArr.length+" 個頻道";
confirmed.innerHTML="";
needConfirm.innerHTML="";

confirmedArr.forEach((d,index)=>{
let diff=Math.floor((d.time-nowTW().getTime())/60000);
let cls="";
if(index===0) cls="rank1";
else if(index===1) cls="rank2";
else if(index===2) cls="rank3";
else if(index===3) cls="rank4";
else if(index===4) cls="rank5";

let text=fmt(new Date(d.time));
if(diff<0) text+="（遲）";
else if(diff===0) text+=" ⚔️ 重生";
else if(diff<=5) text+="（剩 "+diff+" 分）";

confirmed.innerHTML+=`
<div class="card ${cls}">
<button class="delBtn" onclick="deleteChannel('${d.ch}')">✕</button>
<b>${d.ch}</b> ${text}
<button class="actionBtn btnKill" onclick="markKill('${d.ch}')">🔥 擊殺</button>
<button class="actionBtn btnRob" onclick="markRob('${d.ch}')">⚠️ 被搶</button>
</div>`;
});

needArr.forEach(d=>{
let label=d.status==="rob"?"<span class='robbed'>⚠️ 被搶</span>":"🔥 擊殺";
needConfirm.innerHTML+=`
<div class="card">
<button class="delBtn" onclick="deleteChannel('${d.ch}')">✕</button>
<b>${d.ch}</b> ${label}
</div>`;
});
});

let lastMilestone=0;
const milestones=[50,100,120,150,200,250];

db.collection("stats").doc("today").onSnapshot(doc=>{
let total=doc.exists?(doc.data().total||0):0;

stats.innerHTML="🔥 今日擊殺："+total+" ❗";
stats.classList.remove("level1","level2","level3","level4","level5","level6");
stats.classList.add("flash");
setTimeout(()=>stats.classList.remove("flash"),600);

if(total>=250) stats.classList.add("level6");
else if(total>=200) stats.classList.add("level5");
else if(total>=150) stats.classList.add("level4");
else if(total>=120) stats.classList.add("level3");
else if(total>=100) stats.classList.add("level2");
else if(total>=50) stats.classList.add("level1");

for(let m of milestones){
if(total===m && lastMilestone!==m){
lastMilestone=m;
milestone.className="";
milestone.classList.add("milestoneShow");

let colorClass="";
if(m===50) colorClass="m50";
else if(m===100) colorClass="m100";
else if(m===120) colorClass="m120";
else if(m===150) colorClass="m150";
else if(m===200) colorClass="m200";
else if(m>=250) colorClass="m250";

milestone.classList.add(colorClass);
milestone.innerHTML="🎉 "+m+" 達成！";
setTimeout(()=>milestone.classList.remove("milestoneShow"),3000);
}
}
});

async function resetAll(){
if(!confirm("確定重置全部?")) return;
let bosses=await db.collection("bosses").get();
bosses.forEach(doc=>doc.ref.delete());
await db.collection("stats").doc("today").delete();
}
</script>
</body>
</html>
