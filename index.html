<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>檠檠BOSS團隊</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{
font-family:Arial;
background:
linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url("https://megapx-assets.dcard.tw/images/c7fe52fd-3629-450a-9bd7-6a3c81480b6a/640.jpeg");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:#e8f6ff;
padding:15px;
max-width:900px;
margin:auto;
min-height:100vh;
}

.logoWrap{text-align:center;margin-bottom:10px;}
.logo{
width:140px;
margin-bottom:5px;
filter: drop-shadow(0 0 10px rgba(0,200,255,0.7));
}

h2{
text-align:center;
letter-spacing:2px;
color:#7fdfff;
text-shadow:0 0 10px rgba(0,200,255,0.7);
}

textarea{
padding:10px;
width:100%;
border-radius:8px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(0,40,70,0.6);
color:#e8f6ff;
}

button{
padding:6px 10px;
margin:4px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.add{background:#00bcd4;color:#001c2b;}
.kill{background:#00e5ff;color:#003344;}
.robBtn{background:#8b0000;color:#fff;}
.reset{background:#aa2222;color:#fff;}
.copy{background:#045d75;color:#fff;}

.card{
margin:8px 0;
padding:12px;
border-radius:12px;
background:rgba(0,60,90,0.7);
box-shadow:0 0 15px rgba(0,200,255,0.2);
transition:0.3s;
}

/* 遲 */
.late{
background:#5c0000 !important;
color:#ff6b6b;
font-weight:bold;
}

/* 高對比 1~5 分 */
.soon1{ background:#ff2d2d !important; color:#fff; font-weight:bold;} /* 0分 */
.soon2{ background:#8e44ad !important; color:#fff; font-weight:bold;} /* 1分 */
.soon3{ background:#007bff !important; color:#fff; font-weight:bold;} /* 2分 */
.soon4{ background:#00c853 !important; color:#fff; font-weight:bold;} /* 3分 */
.soon5{ background:#ffd600 !important; color:#000; font-weight:bold;} /* 4或5分 */

.unconfirmed{background:rgba(40,30,50,0.6);}
.robbed{
background:rgba(100,0,0,0.8);
color:#ff4d4d;
font-weight:bold;
}

h3{
margin-top:25px;
color:#7fdfff;
border-bottom:1px solid rgba(255,255,255,0.1);
padding-bottom:4px;
}
</style>
</head>
<body>

<div class="logoWrap">
  <img src="./IMG_0391.png?v=1" class="logo">
  <h2>檠檠BOSS團隊</h2>
</div>

<div id="clock"></div>

<textarea id="input" rows="3"
placeholder="761 53 762 53 763 K 764 R 765 0617"
onkeydown="handleKey(event)">
</textarea>

<br>
<button class="add" onclick="handleInput()">新增</button>
<button class="copy" onclick="copyList()">複製清單</button>
<button class="reset" onclick="resetAll()">重置全部</button>

<h3>📡 目前頻道數</h3>
<div id="channelCount"></div>

<h3>✅ 已確認</h3>
<div id="confirmed"></div>

<h3>⚠️ 未確認</h3>
<div id="unconfirmed"></div>

<h3>📊 今日擊殺統計</h3>
<div id="stats"></div>

<script>
const firebaseConfig={
apiKey:"AIzaSyARK9NLOTdrqwkDX3dr9isdwEVGCih5Uno",
authDomain:"ching-fishboss-kill.firebaseapp.com",
projectId:"ching-fishboss-kill"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const increment = firebase.firestore.FieldValue.increment;

function nowTW(){
return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Taipei"}));
}
function fmt(t){return t.toTimeString().slice(0,5);}

function handleKey(e){
if(e.key==="Enter" && e.shiftKey){return;}
if(e.key==="Enter"){e.preventDefault();handleInput();}
}

function processK(ch){
let start=nowTW().getTime()+48*60000;
let end=nowTW().getTime()+60*60000;
db.collection("bosses").doc(ch).set({ch,type:"unconfirmed",start,end});
incrementKill();
}
function processR(ch){
let start=nowTW().getTime()+48*60000;
let end=nowTW().getTime()+60*60000;
db.collection("bosses").doc(ch).set({ch,type:"robbed",start,end});
}

function handleInput(){
let raw=document.getElementById("input").value.trim();
if(!raw)return;
let tokens=raw.split(/\s+/);

for(let i=0;i<tokens.length;i+=2){
let ch=tokens[i];
let arg=tokens[i+1];
if(!ch||!arg) continue;

if(arg==="X"){deleteChannel(ch);continue;}
if(arg==="K"){processK(ch);continue;}
if(arg==="R"){processR(ch);continue;}

let time=null;
if(arg.length===4){
let h=parseInt(arg.slice(0,2));
let m=parseInt(arg.slice(2));
let d=nowTW();
d.setHours(h); d.setMinutes(m);
time=d.getTime();
}else{
let mins=parseInt(arg);
time=nowTW().getTime()+mins*60000;
}
db.collection("bosses").doc(ch).set({ch,type:"confirmed",time});
incrementKill();
}
document.getElementById("input").value="";
}

function incrementKill(){
db.collection("stats").doc("today").set({
total: increment(1)
},{merge:true});
}

function deleteChannel(ch){db.collection("bosses").doc(ch).delete();}

function resetAll(){
if(!confirm("確定清空全部資料？"))return;
db.collection("bosses").get().then(s=>{s.forEach(d=>d.ref.delete())});
db.collection("stats").doc("today").delete();
}

function copyList(){
let text="【檠檠BOSS團隊】\n\n";
document.querySelectorAll("#confirmed .card").forEach(c=>{
let line=c.innerText.replace("擊殺(K)","")
.replace("被搶(R)","").trim();
text+=line+"\n";
});
document.querySelectorAll("#unconfirmed .card").forEach(c=>{
text+=c.innerText+"\n";
});
navigator.clipboard.writeText(text);
alert("已複製清單");
}

let cachedConfirmed=[];

function renderTimers(){
let now=nowTW().getTime();

cachedConfirmed.forEach(item=>{
let diff=Math.floor((item.time-now)/60000);
let el=document.getElementById("timer_"+item.ch);
let card=document.getElementById("card_"+item.ch);
if(!el||!card)return;

card.classList.remove("soon1","soon2","soon3","soon4","soon5","late");

if(diff<0){
el.innerHTML=`${fmt(new Date(item.time))}（遲）`;
card.classList.add("late");
return;
}
if(diff===0){
el.innerHTML=`${fmt(new Date(item.time))} ⚔️ 重生`;
card.classList.add("soon1");
return;
}
if(diff<=5){
el.innerHTML=`${fmt(new Date(item.time))}（剩 ${diff} 分）`;
card.classList.add("soon"+(diff+1));
return;
}
el.innerHTML=`${fmt(new Date(item.time))}`;
});
}

setInterval(function(){
clock.innerText="台灣時間 "+fmt(nowTW());
renderTimers();
},1000);

db.collection("bosses").onSnapshot(s=>{
let confirmedArr=[];
let unconfirmedArr=[];
cachedConfirmed=[];
channelCount.innerHTML="目前 "+s.size+" 個頻道";

s.forEach(doc=>{
let d=doc.data();
if(d.type==="confirmed") confirmedArr.push(d);
else unconfirmedArr.push(d);
});

confirmedArr.sort((a,b)=>a.time-b.time);
unconfirmedArr.sort((a,b)=>a.start-b.start);

confirmed.innerHTML="";
unconfirmed.innerHTML="";

confirmedArr.forEach(d=>{
cachedConfirmed.push(d);
confirmed.innerHTML+=`
<div class="card" id="card_${d.ch}">
<b>${d.ch}</b>
<span id="timer_${d.ch}">${fmt(new Date(d.time))}</span>
<button class="kill" onclick="processK('${d.ch}')">擊殺(K)</button>
<button class="robBtn" onclick="processR('${d.ch}')">被搶(R)</button>
</div>`;
});

unconfirmedArr.forEach(d=>{
let label="";
let extraClass="unconfirmed";
if(d.type==="robbed"){label=" ⚠️ 被搶";extraClass="robbed";}
unconfirmed.innerHTML+=`
<div class="card ${extraClass}">
<b>${d.ch}</b> ${fmt(new Date(d.start))} - ${fmt(new Date(d.end))}${label}
</div>`;
});
});

db.collection("stats").doc("today").onSnapshot(doc=>{
let total=0;
if(doc.exists) total=doc.data().total||0;
stats.innerHTML="今日擊殺："+total;
});
</script>
</body>
</html>
