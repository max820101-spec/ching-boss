<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>檠檠BOSS團隊</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{
font-family:Arial;
background:linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url("https://megapx-assets.dcard.tw/images/c7fe52fd-3629-450a-9bd7-6a3c81480b6a/640.jpeg");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:#e8f6ff;
padding:15px;
max-width:900px;
margin:auto;
}

.logo{
display:block;
margin:0 auto 10px auto;
width:150px;
filter:drop-shadow(0 0 10px rgba(0,200,255,0.8));
}

textarea{
padding:10px;width:100%;
border-radius:8px;
background:rgba(0,40,70,0.6);
color:#fff;margin-bottom:5px;
}

button{
padding:6px 10px;margin:4px;
border:none;border-radius:8px;
font-weight:bold;cursor:pointer;
}

.killBtn{background:#ff1744;color:#fff;}
.checkBtn{background:#00bcd4;color:#001c2b;}
.resetBtn{background:#aa2222;color:#fff;}
.leaderBtn{background:#444;color:#fff;}

.card{
margin:8px 0;padding:12px;
border-radius:12px;
background:rgba(0,60,90,0.7);
}

.delBtn{
background:#ff5252;
color:#fff;
border-radius:50%;
padding:3px 7px;
margin-right:6px;
font-size:12px;
}

.editBtn{
background:#ffaa00;
color:#000;
border-radius:6px;
padding:3px 7px;
font-size:12px;
margin-left:6px;
}

/* 擊殺等級 */
.level1{color:#ffd600;}
.level2{color:#00e676;}
.level3{color:#00b0ff;}
.level4{color:#aa00ff;}
.level5{color:#ff9800;}
.level6{color:#ff1744;}
.level7{
background:linear-gradient(45deg,#ff0000,#ff9900,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:bold;
}

#stats{
font-size:40px;
font-weight:bold;
text-align:center;
margin:10px 0;
}

h2{text-align:center;}
h3{margin-top:25px;}
</style>
</head>
<body>

<img src="IMG_0391.png" class="logo">
<h2>檠檠BOSS團隊</h2>

<button class="leaderBtn" onclick="enableLeader()">🔐 團長模式</button>

<div id="stats"></div>
<div id="record"></div>

<h3>⚔️ 擊殺並更新（會 +1）</h3>
<textarea id="killInput" rows="2"></textarea>
<button class="killBtn" onclick="handleKill()">擊殺並更新</button>

<h3>⏱ 確認時間（不 +1）</h3>
<textarea id="checkInput" rows="2"></textarea>
<button class="checkBtn" onclick="handleCheck()">確認時間</button>

<button class="resetBtn" onclick="resetAll()">重置全部</button>

<h3>📝 需要再確認</h3>
<div id="needConfirm"></div>
<button onclick="copyNeed()">一鍵複製未確認</button>

<h3>📅 最近三天戰報</h3>
<div id="history"></div>

<script>
const firebaseConfig={
apiKey:"AIzaSyARK9NLOTdrqwkDX3dr9isdwEVGCih5Uno",
authDomain:"ching-fishboss-kill.firebaseapp.com",
projectId:"ching-fishboss-kill"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const increment=firebase.firestore.FieldValue.increment;

let isLeader=false;
function enableLeader(){
let pwd=prompt("請輸入團長密碼");
if(pwd==="0925"){
isLeader=true;
alert("團長模式啟用");
renderHistory();
}else{
alert("密碼錯誤");
}
}

function nowTW(){
return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Taipei"}));
}
function fmt(t){return t.toTimeString().slice(0,5);}

async function incrementKill(){
let now=nowTW();
let timeStr=fmt(now);
let doc=await db.collection("stats").doc("today").get();

if(!doc.exists){
await db.collection("stats").doc("today").set({
total:1,startTime:timeStr,endTime:timeStr
});
}else{
await db.collection("stats").doc("today").update({
total:increment(1),
endTime:timeStr
});
}
}

function parseAndUpdate(raw,addKill){
let tokens=raw.trim().split(/\s+/);
for(let i=0;i<tokens.length;i+=2){
let ch=tokens[i];
let arg=tokens[i+1];
if(!ch||!arg)continue;

let time;
if(arg.length===4){
let h=parseInt(arg.slice(0,2));
let m=parseInt(arg.slice(2));
let d=nowTW();
d.setHours(h);d.setMinutes(m);
time=d.getTime();
}else{
time=nowTW().getTime()+parseInt(arg)*60000;
}

db.collection("bosses").doc(ch).set({ch,type:"confirmed",time});
if(addKill) incrementKill();
}
}

function handleKill(){parseAndUpdate(killInput.value,true);killInput.value="";}
function handleCheck(){parseAndUpdate(checkInput.value,false);checkInput.value="";}

function copyNeed(){
let text="";
document.querySelectorAll("#needConfirm .card b").forEach(el=>{
text+=el.innerText+" ";
});
navigator.clipboard.writeText(text);
alert("已複製");
}

/* ===== 歷史 ===== */
function renderHistory(){
db.collection("historyDays")
.orderBy(firebase.firestore.FieldPath.documentId(),"desc")
.limit(3)
.onSnapshot(snapshot=>{
history.innerHTML="";
let maxKill=0;
let maxDate="-";

snapshot.forEach(doc=>{
let d=doc.data();
if(d.total>maxKill){maxKill=d.total;maxDate=doc.id;}

let delBtn=isLeader?
`<button class="delBtn" onclick="deleteHistory('${doc.id}')">✕</button>`:"";

let editBtn=isLeader?
`<button class="editBtn" onclick="editHistory('${doc.id}',${d.total},'${d.startTime}','${d.endTime}')">編輯</button>`:"";

history.innerHTML+=`
<div class="card">
${delBtn}
<b>${doc.id}</b><br>
🔥 ${d.total} 隻<br>
🕒 ${d.startTime} ～ ${d.endTime}
${editBtn}
</div>`;
});

if(maxKill>0){
record.innerHTML="🏆 最高單日："+maxKill+" 隻（"+maxDate+"）";
}
});
}

function deleteHistory(id){
if(!isLeader) return;
if(!confirm("確定刪除？")) return;
db.collection("historyDays").doc(id).delete();
}

function editHistory(id,total,start,end){
if(!isLeader) return;
let newTotal=prompt("擊殺數",total);
let newStart=prompt("開始時間 HH:MM",start);
let newEnd=prompt("結束時間 HH:MM",end);

db.collection("historyDays").doc(id).update({
total:parseInt(newTotal),
startTime:newStart,
endTime:newEnd
});
}

renderHistory();
</script>
</body>
</html>
