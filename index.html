<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>檠檠BOSS團隊</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{
font-family:Arial;
background:linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url("https://megapx-assets.dcard.tw/images/c7fe52fd-3629-450a-9bd7-6a3c81480b6a/640.jpeg");
background-size:cover;
color:#e8f6ff;
padding:15px;
max-width:900px;
margin:auto;
}

.logo{
display:block;
margin:0 auto 10px auto;
width:150px;
}

textarea{
width:100%;
padding:10px;
margin-bottom:5px;
border-radius:8px;
background:rgba(0,40,70,0.6);
color:#fff;
}

button{
margin:4px;
padding:6px 10px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.killBtn{background:#ff1744;color:#fff;}
.checkBtn{background:#00bcd4;color:#001c2b;}
.resetBtn{background:#aa2222;color:#fff;}
.leaderBtn{background:#444;color:#fff;}
.copyBtn{background:#00695c;color:#fff;}

.card{
background:rgba(0,60,90,0.7);
padding:12px;
border-radius:12px;
margin:6px 0;
}

.delBtn{
background:#ff5252;
color:#fff;
border-radius:50%;
padding:3px 7px;
font-size:12px;
margin-right:6px;
}

.editBtn{
background:#ffaa00;
color:#000;
border-radius:6px;
padding:3px 7px;
font-size:12px;
margin-left:6px;
}

.rank1{background:#ff2d2d !important;}
.rank2{background:#8e44ad !important;}
.rank3{background:#007bff !important;}
.rank4{background:#00c853 !important;}
.rank5{background:#ffd600 !important;color:#000;}

.level1{color:#ffd600;}
.level2{color:#00e676;}
.level3{color:#00b0ff;}
.level4{color:#aa00ff;}
.level5{color:#ff9800;}
.level6{color:#ff1744;}
.level7{
background:linear-gradient(45deg,#ff0000,#ff9900,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:bold;
}

#stats{
font-size:42px;
text-align:center;
margin:10px 0;
font-weight:bold;
}

/* 作者發光效果 */
.creator{
text-align:center;
margin-top:40px;
font-size:16px;
color:#00e5ff;
font-weight:bold;
text-shadow:
0 0 5px #00e5ff,
0 0 10px #00bcd4,
0 0 20px #00e5ff,
0 0 30px #0097a7;
animation:glowPulse 2s infinite alternate;
}

@keyframes glowPulse{
from{ text-shadow:
0 0 5px #00e5ff,
0 0 10px #00bcd4,
0 0 20px #00e5ff; }
to{ text-shadow:
0 0 10px #00ffff,
0 0 20px #00e5ff,
0 0 35px #00bcd4; }
}
</style>
</head>
<body>

<img src="IMG_0391.png" class="logo">
<h2 style="text-align:center;">檠檠BOSS團隊</h2>

<button class="leaderBtn" onclick="enableLeader()">🔐 製作者模式</button>

<div id="stats"></div>
<div id="record"></div>

<h3>⚔️ 擊殺並更新（會 +1）</h3>
<textarea id="killInput"></textarea>
<button class="killBtn" onclick="handleKill()">送出</button>

<h3>⏱ 確認時間（不 +1）</h3>
<textarea id="checkInput"></textarea>
<button class="checkBtn" onclick="handleCheck()">送出</button>

<button class="resetBtn" onclick="resetAll()">重置全部</button>

<h3>📡 已確認頻道（<span id="channelCount">0</span>）</h3>
<div id="confirmed"></div>

<h3>📝 需要再確認</h3>
<div id="needConfirm"></div>
<button class="copyBtn" onclick="copyNeed()">一鍵複製未確認</button>

<h3>📅 最近三天戰報</h3>
<div id="history"></div>

<div class="creator">
作者: Ching檠
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyARK9NLOTdrqwkDX3dr9isdwEVGCih5Uno",
authDomain:"ching-fishboss-kill.firebaseapp.com",
projectId:"ching-fishboss-kill"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const increment=firebase.firestore.FieldValue.increment;

let isLeader=false;

function enableLeader(){
let pwd=prompt("請輸入製作者密碼");
if(pwd==="0925"){
isLeader=true;
alert("製作者模式啟用");
renderHistory();
}else{
alert("密碼錯誤");
}
}

function nowTW(){
return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Taipei"}));
}
function fmt(t){return t.toTimeString().slice(0,5);}

/* Enter送出 */
["killInput","checkInput"].forEach(id=>{
document.getElementById(id).addEventListener("keydown",function(e){
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
id==="killInput"?handleKill():handleCheck();
}
});
});

/* 今日擊殺監聽 */
db.collection("stats").doc("today").onSnapshot(doc=>{
let total=0;
if(doc.exists) total=doc.data().total||0;

let level="level1";
if(total>=250) level="level7";
else if(total>=200) level="level6";
else if(total>=150) level="level5";
else if(total>=120) level="level4";
else if(total>=100) level="level3";
else if(total>=50) level="level2";

stats.className="";
stats.classList.add(level);
stats.innerHTML="🔥 今日擊殺："+total+" ❗";
});

/* 其他功能保留 */
function handleKill(){}
function handleCheck(){}
function copyNeed(){}
function resetAll(){}
function renderHistory(){}
</script>

</body>
</html>
