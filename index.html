<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>檠檠BOSS團隊</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{
font-family:Arial;
background:linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url("https://megapx-assets.dcard.tw/images/c7fe52fd-3629-450a-9bd7-6a3c81480b6a/640.jpeg");
background-size:cover;
background-position:center;
color:#e8f6ff;
padding:15px;
max-width:900px;
margin:auto;
}

.logo{
display:block;
margin:0 auto 10px auto;
width:150px;
}

textarea{
width:100%;
padding:10px;
margin-bottom:5px;
border-radius:8px;
background:rgba(0,40,70,0.6);
color:#fff;
}

button{
margin:4px;
padding:6px 10px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.killBtn{background:#ff1744;color:#fff;}
.checkBtn{background:#00bcd4;color:#001c2b;}
.resetBtn{background:#aa2222;color:#fff;}
.leaderBtn{background:#444;color:#fff;}
.copyBtn{background:#00695c;color:#fff;}

.card{
background:rgba(0,60,90,0.7);
padding:12px;
border-radius:12px;
margin:6px 0;
}

.delBtn{
background:#ff5252;
color:#fff;
border-radius:50%;
padding:3px 7px;
font-size:12px;
margin-right:6px;
}

.editBtn{
background:#ffaa00;
color:#000;
border-radius:6px;
padding:3px 7px;
font-size:12px;
margin-left:6px;
}

/* 前5 */
.rank1{background:#ff2d2d !important;}
.rank2{background:#8e44ad !important;}
.rank3{background:#007bff !important;}
.rank4{background:#00c853 !important;}
.rank5{background:#ffd600 !important;color:#000;}

.level1{color:#ffd600;}
.level2{color:#00e676;}
.level3{color:#00b0ff;}
.level4{color:#aa00ff;}
.level5{color:#ff9800;}
.level6{color:#ff1744;}
.level7{
background:linear-gradient(45deg,#ff0000,#ff9900,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:bold;
}

#stats{
font-size:40px;
text-align:center;
margin:10px 0;
font-weight:bold;
}
</style>
</head>
<body>

<img src="IMG_0391.png" class="logo">
<h2 style="text-align:center;">檠檠BOSS團隊</h2>

<button class="leaderBtn" onclick="enableLeader()">🔐 團長模式</button>

<div id="stats"></div>
<div id="record"></div>

<h3>⚔️ 擊殺並更新（會 +1）</h3>
<textarea id="killInput"></textarea>
<button class="killBtn" onclick="handleKill()">送出</button>

<h3>⏱ 確認時間（不 +1）</h3>
<textarea id="checkInput"></textarea>
<button class="checkBtn" onclick="handleCheck()">送出</button>

<button class="resetBtn" onclick="resetAll()">重置全部</button>

<h3>📡 已確認頻道（<span id="channelCount">0</span>）</h3>
<div id="confirmed"></div>

<h3>📝 需要再確認</h3>
<div id="needConfirm"></div>
<button class="copyBtn" onclick="copyNeed()">一鍵複製未確認</button>

<h3>📅 最近三天戰報</h3>
<div id="history"></div>

<script>
const firebaseConfig={
apiKey:"AIzaSyARK9NLOTdrqwkDX3dr9isdwEVGCih5Uno",
authDomain:"ching-fishboss-kill.firebaseapp.com",
projectId:"ching-fishboss-kill"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const increment=firebase.firestore.FieldValue.increment;

let isLeader=false;

function enableLeader(){
let pwd=prompt("請輸入團長密碼");
if(pwd==="0925"){
isLeader=true;
alert("團長模式啟用");
}else{
alert("密碼錯誤");
}
}

function nowTW(){
return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Taipei"}));
}
function fmt(t){return t.toTimeString().slice(0,5);}

/* Enter送出 */
["killInput","checkInput"].forEach(id=>{
document.getElementById(id).addEventListener("keydown",function(e){
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
id==="killInput"?handleKill():handleCheck();
}
});
});

/* 擊殺 */
async function incrementKill(){
let now=fmt(nowTW());
let doc=await db.collection("stats").doc("today").get();
if(!doc.exists){
await db.collection("stats").doc("today").set({
total:1,startTime:now,endTime:now
});
}else{
await db.collection("stats").doc("today").update({
total:increment(1),
endTime:now
});
}
}

function parseAndUpdate(raw,addKill){
let tokens=raw.trim().split(/\s+/);
for(let i=0;i<tokens.length;i+=2){
let ch=tokens[i];
let arg=tokens[i+1];
if(!ch||!arg)continue;

let time;
if(arg.length===4){
let h=parseInt(arg.slice(0,2));
let m=parseInt(arg.slice(2));
let d=nowTW();
d.setHours(h);d.setMinutes(m);
time=d.getTime();
}else{
time=nowTW().getTime()+parseInt(arg)*60000;
}

db.collection("bosses").doc(ch).set({ch,type:"confirmed",time});
if(addKill) incrementKill();
}
}

function handleKill(){parseAndUpdate(killInput.value,true);killInput.value="";}
function handleCheck(){parseAndUpdate(checkInput.value,false);checkInput.value="";}

function deleteChannel(ch){
db.collection("bosses").doc(ch).delete();
}

/* 監聽boss */
db.collection("bosses").onSnapshot(s=>{
let confirmedArr=[];
let needArr=[];

s.forEach(doc=>{
let d=doc.data();
if(d.type==="confirmed") confirmedArr.push(d);
if(d.type==="need") needArr.push(d);
});

confirmedArr.sort((a,b)=>a.time-b.time);
needArr.sort((a,b)=>b.time-a.time);

channelCount.innerText=confirmedArr.length;

confirmed.innerHTML="";
confirmedArr.forEach((d,i)=>{
let diff=Math.floor((d.time-nowTW().getTime())/60000);
let cls="";
if(i===0)cls="rank1";
else if(i===1)cls="rank2";
else if(i===2)cls="rank3";
else if(i===3)cls="rank4";
else if(i===4)cls="rank5";

let text=fmt(new Date(d.time));
if(diff<0) text+="（遲）";
else if(diff===0) text+=" ⚔️ 重生";
else if(diff<=5) text+="（剩 "+diff+" 分）";

confirmed.innerHTML+=`
<div class="card ${cls}">
<button class="delBtn" onclick="deleteChannel('${d.ch}')">✕</button>
<b>${d.ch}</b> ${text}
</div>`;
});

needConfirm.innerHTML="";
needArr.forEach(d=>{
let label=d.status==="rob"?"⚠️ 被搶":"擊殺";
needConfirm.innerHTML+=`
<div class="card">
<button class="delBtn" onclick="deleteChannel('${d.ch}')">✕</button>
<b>${d.ch}</b> ${label}
</div>`;
});
});

/* 複製未確認 */
function copyNeed(){
let text="";
document.querySelectorAll("#needConfirm b").forEach(el=>{
text+=el.innerText+" ";
});
navigator.clipboard.writeText(text);
alert("已複製");
}
</script>
</body>
</html>
