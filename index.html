<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>檠檠BOSS團隊</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{
font-family:Arial;
background:linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url("https://megapx-assets.dcard.tw/images/c7fe52fd-3629-450a-9bd7-6a3c81480b6a/640.jpeg");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:#e8f6ff;
padding:15px;
max-width:900px;
margin:auto;
min-height:100vh;
}

textarea{
padding:10px;width:100%;
border-radius:8px;
background:rgba(0,40,70,0.6);
color:#fff;margin-bottom:5px;
}

button{
padding:6px 10px;margin:4px;
border:none;border-radius:8px;
font-weight:bold;cursor:pointer;
}

.killBtn{background:#ff1744;color:#fff;}
.checkBtn{background:#00bcd4;color:#001c2b;}
.resetBtn{background:#aa2222;color:#fff;}

.card{
margin:8px 0;padding:12px;
border-radius:12px;
background:rgba(0,60,90,0.7);
}

.rank1{background:#ff2d2d !important;color:#fff;}
.rank2{background:#8e44ad !important;color:#fff;}
.rank3{background:#007bff !important;color:#fff;}
.rank4{background:#00c853 !important;color:#fff;}
.rank5{background:#ffd600 !important;color:#000;}

.delBtn{
background:#ff5252;
color:#fff;
border-radius:50%;
padding:3px 7px;
margin-right:6px;
font-size:12px;
}

/* ===== 擊殺顏色等級 ===== */
.level1{color:#ffd600;text-shadow:0 0 10px #ffd600;}
.level2{color:#00e676;text-shadow:0 0 12px #00e676;}
.level3{color:#00b0ff;text-shadow:0 0 12px #00b0ff;}
.level4{color:#aa00ff;text-shadow:0 0 15px #aa00ff;}
.level5{color:#ff9800;text-shadow:0 0 15px #ff9800;}
.level6{color:#ff1744;text-shadow:0 0 15px #ff1744;}
.level7{
background:linear-gradient(45deg,#ff0000,#ff9900,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:bold;
}

#stats{
font-size:40px;
font-weight:bold;
text-align:center;
margin:10px 0;
transition:0.3s;
}

#milestone{
text-align:center;
font-size:20px;
margin-bottom:10px;
opacity:0;
transition:0.5s;
}

.milestoneShow{
opacity:1;
transform:scale(1.1);
}

.flash{
animation:flash 0.6s;
}

@keyframes flash{
0%{transform:scale(1);}
50%{transform:scale(1.25);}
100%{transform:scale(1);}
}

h3{margin-top:25px;}
</style>
</head>
<body>

<h2>檠檠BOSS團隊</h2>
<div id="clock"></div>
<div id="stats"></div>
<div id="milestone"></div>

<h3>⚔️ 擊殺並更新（會 +1）</h3>
<textarea id="killInput" rows="2"></textarea>
<button class="killBtn" onclick="handleKill()">擊殺並更新</button>

<h3>⏱ 確認時間（不 +1）</h3>
<textarea id="checkInput" rows="2"></textarea>
<button class="checkBtn" onclick="handleCheck()">確認時間</button>

<button class="resetBtn" onclick="resetAll()">重置全部</button>

<h3>📡 已確認</h3>
<div id="confirmed"></div>

<h3>📅 最近三天戰報</h3>
<div id="history"></div>

<script>
const firebaseConfig={
apiKey:"AIzaSyARK9NLOTdrqwkDX3dr9isdwEVGCih5Uno",
authDomain:"ching-fishboss-kill.firebaseapp.com",
projectId:"ching-fishboss-kill"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const increment=firebase.firestore.FieldValue.increment;

function nowTW(){
return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Taipei"}));
}
function fmt(t){return t.toTimeString().slice(0,5);}

async function incrementKill(){
let now=nowTW();
let timeStr=fmt(now);
let doc=await db.collection("stats").doc("today").get();

if(!doc.exists){
await db.collection("stats").doc("today").set({
total:1,startTime:timeStr,endTime:timeStr
});
}else{
await db.collection("stats").doc("today").update({
total:increment(1),
endTime:timeStr
});
}
}

function parseAndUpdate(raw,addKill){
let tokens=raw.trim().split(/\s+/);
for(let i=0;i<tokens.length;i+=2){
let ch=tokens[i];
let arg=tokens[i+1];
if(!ch||!arg)continue;

let time;
if(arg.length===4){
let h=parseInt(arg.slice(0,2));
let m=parseInt(arg.slice(2));
let d=nowTW();
d.setHours(h);d.setMinutes(m);
time=d.getTime();
}else{
time=nowTW().getTime()+parseInt(arg)*60000;
}

db.collection("bosses").doc(ch).set({ch,type:"confirmed",time});
if(addKill) incrementKill();
}
}

function handleKill(){parseAndUpdate(killInput.value,true);killInput.value="";}
function handleCheck(){parseAndUpdate(checkInput.value,false);checkInput.value="";}

function deleteChannel(ch){
db.collection("bosses").doc(ch).delete();
}

setInterval(()=>{
clock.innerText="台灣時間 "+fmt(nowTW());
},1000);

db.collection("bosses").onSnapshot(s=>{
let arr=[];
s.forEach(doc=>{if(doc.data().type==="confirmed")arr.push(doc.data());});
arr.sort((a,b)=>a.time-b.time);

confirmed.innerHTML="";
arr.forEach((d,i)=>{
let diff=Math.floor((d.time-nowTW().getTime())/60000);
let cls="";
if(i===0)cls="rank1";
else if(i===1)cls="rank2";
else if(i===2)cls="rank3";
else if(i===3)cls="rank4";
else if(i===4)cls="rank5";

let text=fmt(new Date(d.time));
if(diff<0) text+="（遲）";
else if(diff===0) text+=" ⚔️ 重生";
else if(diff<=5) text+="（剩 "+diff+" 分）";

confirmed.innerHTML+=`
<div class="card ${cls}">
<button class="delBtn" onclick="deleteChannel('${d.ch}')">✕</button>
<b>${d.ch}</b> ${text}
</div>`;
});
});

/* ===== 今日擊殺 + 顏色 + 里程碑 ===== */
const milestones=[50,100,120,150,200,250];
let lastMilestone=0;

db.collection("stats").doc("today").onSnapshot(doc=>{
let total=0;
if(doc.exists) total=doc.data().total||0;

let level="level1";
if(total>=250) level="level7";
else if(total>=200) level="level6";
else if(total>=150) level="level5";
else if(total>=120) level="level4";
else if(total>=100) level="level3";
else if(total>=50) level="level2";

stats.className="";
stats.classList.add(level);

stats.innerHTML="🔥 今日擊殺："+total+" ❗";
stats.classList.add("flash");
setTimeout(()=>stats.classList.remove("flash"),600);

for(let m of milestones){
if(total===m && lastMilestone!==m){
lastMilestone=m;
milestone.innerHTML="🎉 "+m+" 達成！";
milestone.classList.add("milestoneShow");
setTimeout(()=>milestone.classList.remove("milestoneShow"),3000);
}
}
});

/* ===== 重置 + 歷史保存 ===== */
async function resetAll(){
if(!confirm("確定重置？會保存今日戰報"))return;

let todayDoc=await db.collection("stats").doc("today").get();
if(todayDoc.exists){
let d=todayDoc.data();
let total=d.total||0;
let start=d.startTime||"-";
let end=d.endTime||"-";

let now=nowTW();
let dateStr=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,'0')+"-"+String(now.getDate()).padStart(2,'0');

await db.collection("stats").doc("history")
.collection("days").doc(dateStr)
.set({total,startTime:start,endTime:end});
}

let bosses=await db.collection("bosses").get();
bosses.forEach(d=>d.ref.delete());
await db.collection("stats").doc("today").delete();

/* 只留3天 */
let snap=await db.collection("stats").doc("history")
.collection("days")
.orderBy(firebase.firestore.FieldPath.documentId(),"desc")
.get();
let count=0;
for(let doc of snap.docs){
count++;
if(count>3) await doc.ref.delete();
}
}

/* ===== 歷史顯示 ===== */
db.collection("stats").doc("history")
.collection("days")
.orderBy(firebase.firestore.FieldPath.documentId(),"desc")
.limit(3)
.onSnapshot(snapshot=>{
history.innerHTML="";
snapshot.forEach(doc=>{
let d=doc.data();
let duration="-";
let avg="-";

if(d.startTime&&d.endTime){
let [sh,sm]=d.startTime.split(":").map(Number);
let [eh,em]=d.endTime.split(":").map(Number);
let start=sh*60+sm;
let end=eh*60+em;
let diff=end-start;
if(diff<0) diff+=1440;

let h=Math.floor(diff/60);
let m=diff%60;
duration=h+"小時"+m+"分";

let hours=diff/60;
if(hours>0) avg=(d.total/hours).toFixed(1);
}

history.innerHTML+=`
<div class="card">
<b>${doc.id}</b><br>
🔥 ${d.total} 隻<br>
🕒 ${d.startTime} ～ ${d.endTime}<br>
⏳ ${duration}<br>
⚡ 平均 ${avg} 隻/小時
</div>`;
});
});
</script>
</body>
</html>
