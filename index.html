<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>檠檠BOSS團隊</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#0f1115;color:#eee;padding:15px;max-width:900px;margin:auto}
textarea{padding:10px;width:100%;border-radius:6px}
button{padding:6px 10px;margin:3px;border:none;border-radius:6px;cursor:pointer}
.add{background:#00aa66;color:#fff}
.kill{background:#ffaa00}
.reset{background:#aa2222;color:#fff}
.copy{background:#444;color:#fff}
.card{margin:6px 0;padding:10px;background:#1a1f27;border-radius:8px}
.late{color:#ff4444}
.unconfirmed{background:#2a1f1f}
.robbed{background:#3a1212;color:#ff4d4d;font-weight:bold;}
</style>
</head>
<body>

<h2>🔥 檠檠BOSS團隊</h2>
<div id="clock"></div>

<textarea id="input" rows="3"
placeholder="761 53 762 53 763 K 764 R 765 0617"
onkeydown="handleKey(event)">
</textarea>

<br>
<button class="add" onclick="handleInput()">新增</button>
<button class="copy" onclick="copyList()">複製清單</button>
<button class="reset" onclick="resetAll()">重置全部</button>

<h3>📡 目前頻道數</h3>
<div id="channelCount"></div>

<h3>✅ 已確認</h3>
<div id="confirmed"></div>

<h3>⚠️ 未確認</h3>
<div id="unconfirmed"></div>

<h3>📊 今日擊殺統計</h3>
<div id="stats"></div>

<script>
const firebaseConfig={
apiKey:"AIzaSyARK9NLOTdrqwkDX3dr9isdwEVGCih5Uno",
authDomain:"ching-fishboss-kill.firebaseapp.com",
projectId:"ching-fishboss-kill"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

function nowTW(){
return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Taipei"}));
}

function fmt(t){
return t.toTimeString().slice(0,5);
}

function updateClock(){
clock.innerText="台灣時間 "+fmt(nowTW());
}
setInterval(updateClock,1000);
updateClock();

function handleKey(e){
if(e.key==="Enter" && e.shiftKey){return;}
if(e.key==="Enter"){
e.preventDefault();
handleInput();
}
}

function processK(ch){
let start=nowTW().getTime()+48*60000;
let end=nowTW().getTime()+60*60000;
db.collection("bosses").doc(ch).set({ch,type:"unconfirmed",start,end});
incrementKill();
}

function handleInput(){
let raw=document.getElementById("input").value.trim();
if(!raw)return;

let tokens=raw.split(/\s+/);

for(let i=0;i<tokens.length;i+=2){

let ch=tokens[i];
let arg=tokens[i+1];
if(!ch||!arg) continue;

if(arg==="X"){
deleteChannel(ch);
continue;
}

if(arg==="K"){
processK(ch);
continue;
}

if(arg==="R"){
let start=nowTW().getTime()+48*60000;
let end=nowTW().getTime()+60*60000;
db.collection("bosses").doc(ch).set({ch,type:"robbed",start,end});
continue;
}

let time=null;

if(arg.length===4){
let h=parseInt(arg.slice(0,2));
let m=parseInt(arg.slice(2));
let d=nowTW();
d.setHours(h);
d.setMinutes(m);
time=d.getTime();
}
else{
let mins=parseInt(arg);
time=nowTW().getTime()+mins*60000;
}

db.collection("bosses").doc(ch).set({ch,type:"confirmed",time});
incrementKill();
}

document.getElementById("input").value="";
}

function incrementKill(){
db.collection("stats").doc("today").get().then(doc=>{
let total=0;
if(doc.exists) total=doc.data().total||0;
db.collection("stats").doc("today").set({total:total+1});
});
}

function deleteChannel(ch){
db.collection("bosses").doc(ch).delete();
}

function resetAll(){
if(!confirm("確定清空全部資料？"))return;
db.collection("bosses").get().then(s=>{s.forEach(d=>d.ref.delete())});
db.collection("stats").doc("today").delete();
}

function copyList(){
let text="【檠檠BOSS團隊】\n\n";
document.querySelectorAll(".card").forEach(c=>{
text+=c.innerText+"\n";
});
navigator.clipboard.writeText(text);
alert("已複製清單");
}

db.collection("bosses").onSnapshot(s=>{
let now=nowTW().getTime();
let confirmedArr=[];
let unconfirmedArr=[];

channelCount.innerHTML="目前 "+s.size+" 個頻道";

s.forEach(doc=>{
let d=doc.data();
if(d.type==="confirmed") confirmedArr.push(d);
else unconfirmedArr.push(d);
});

confirmedArr.sort((a,b)=>a.time-b.time);
unconfirmedArr.sort((a,b)=>a.start-b.start);

confirmed.innerHTML="";
unconfirmed.innerHTML="";

confirmedArr.forEach(d=>{
let late=d.time<now;
confirmed.innerHTML+=`
<div class="card">
<b>${d.ch}</b> ${fmt(new Date(d.time))}
${late?'<span class="late"> 遲</span>':''}
<button class="kill" onclick="processK('${d.ch}')">擊殺(K)</button>
</div>`;
});

unconfirmedArr.forEach(d=>{
let label="";
let extraClass="unconfirmed";

if(d.type==="robbed"){
label=" ⚠️ 被搶";
extraClass="robbed";
}

unconfirmed.innerHTML+=`
<div class="card ${extraClass}">
<b>${d.ch}</b> ${fmt(new Date(d.start))} - ${fmt(new Date(d.end))}${label}
</div>`;
});
});

db.collection("stats").doc("today").onSnapshot(doc=>{
if(!doc.exists){stats.innerHTML="今日 0 次";return;}
stats.innerHTML="今日 "+(doc.data().total||0)+" 次";
});
</script>

</body>
</html>
